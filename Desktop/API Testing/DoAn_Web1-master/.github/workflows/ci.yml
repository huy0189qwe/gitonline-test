name: CI

on:
  push:
    branches:
      - master  # Hoặc main nếu bạn đã đổi tên nhánh
  pull_request:
    branches:
      - master  # Hoặc main nếu bạn đã đổi tên nhánh

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Set up Node.js
      uses: actions/setup-node@v2
      with:
        node-version: '14' # Hoặc phiên bản Node.js bạn đang sử dụng

    - name: Install dependencies
      run: npm install

    - name: Run tests
      run: npx codeceptjs run --steps